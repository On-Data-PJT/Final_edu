services:
  - type: web
    name: final-edu-web
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install uv && uv sync
    startCommand: .venv/bin/python -m final_edu --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: FINAL_EDU_MAX_UPLOAD_MB
        value: "100"
      - key: FINAL_EDU_JOB_TTL_DAYS
        value: "7"
      - key: FINAL_EDU_MAX_SAVED_JOBS
        value: "20"
      - key: FINAL_EDU_JOB_TIMEOUT_SECONDS
        value: "7200"
      - key: FINAL_EDU_YOUTUBE_REQUEST_MIN_INTERVAL_SECONDS
        value: "1.5"
      - key: FINAL_EDU_YOUTUBE_DISTRIBUTED_MIN_INTERVAL_SECONDS
        value: "2.5"
      - key: FINAL_EDU_YOUTUBE_COOLDOWN_SECONDS
        value: "900"
      - key: FINAL_EDU_YOUTUBE_METADATA_CACHE_TTL_SECONDS
        value: "86400"
      - key: FINAL_EDU_YOUTUBE_TRANSCRIPT_CACHE_TTL_SECONDS
        value: "604800"
      - key: FINAL_EDU_PLAYLIST_PROBE_FULL_THRESHOLD
        value: "30"
      - key: FINAL_EDU_PLAYLIST_PROBE_PARTIAL_SAMPLE_SIZE
        value: "3"
      - key: FINAL_EDU_PLAYLIST_PROBE_DISABLE_THRESHOLD
        value: "200"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_ENABLED
        value: "true"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_PROXY_PORT
        value: "8001"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_SESSION_STICKY
        value: "true"
      - key: FINAL_EDU_YOUTUBE_STT_ENABLED
        value: "true"
      - key: FINAL_EDU_YOUTUBE_STT_MODEL
        value: gpt-4o-mini-transcribe
      - key: FINAL_EDU_YOUTUBE_STT_MAX_FILE_BYTES
        value: "25000000"
      - key: FINAL_EDU_YOUTUBE_STT_MONTHLY_MINUTES_BUDGET
        value: "500"
      - key: FINAL_EDU_DEMO_SEEDING_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: final-edu-kv
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
  - type: worker
    name: final-edu-worker
    runtime: python
    region: singapore
    plan: standard
    buildCommand: pip install uv && uv sync
    startCommand: .venv/bin/python -m final_edu.worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: FINAL_EDU_MAX_UPLOAD_MB
        value: "100"
      - key: FINAL_EDU_JOB_TTL_DAYS
        value: "7"
      - key: FINAL_EDU_MAX_SAVED_JOBS
        value: "20"
      - key: FINAL_EDU_JOB_TIMEOUT_SECONDS
        value: "7200"
      - key: FINAL_EDU_YOUTUBE_REQUEST_MIN_INTERVAL_SECONDS
        value: "1.5"
      - key: FINAL_EDU_YOUTUBE_DISTRIBUTED_MIN_INTERVAL_SECONDS
        value: "2.5"
      - key: FINAL_EDU_YOUTUBE_COOLDOWN_SECONDS
        value: "900"
      - key: FINAL_EDU_YOUTUBE_METADATA_CACHE_TTL_SECONDS
        value: "86400"
      - key: FINAL_EDU_YOUTUBE_TRANSCRIPT_CACHE_TTL_SECONDS
        value: "604800"
      - key: FINAL_EDU_PLAYLIST_PROBE_FULL_THRESHOLD
        value: "30"
      - key: FINAL_EDU_PLAYLIST_PROBE_PARTIAL_SAMPLE_SIZE
        value: "3"
      - key: FINAL_EDU_PLAYLIST_PROBE_DISABLE_THRESHOLD
        value: "200"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_ENABLED
        value: "true"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_PROXY_PORT
        value: "8001"
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_SESSION_STICKY
        value: "true"
      - key: FINAL_EDU_YOUTUBE_STT_ENABLED
        value: "true"
      - key: FINAL_EDU_YOUTUBE_STT_MODEL
        value: gpt-4o-mini-transcribe
      - key: FINAL_EDU_YOUTUBE_STT_MAX_FILE_BYTES
        value: "25000000"
      - key: FINAL_EDU_YOUTUBE_STT_MONTHLY_MINUTES_BUDGET
        value: "500"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: final-edu-kv
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: FINAL_EDU_YOUTUBE_SCRAPERAPI_KEY
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
  - type: keyvalue
    name: final-edu-kv
    region: singapore
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
